name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  LLVM_VERSION: 22
  GCC_VERSION: 15
  # Pin the standard library for clang explicitly so the build is deterministic
  # and does not silently fall back to whatever libstdc++ happens to be around.
  # libc++ is used for clang because it is free of the clang+libstdc++
  # std::forward_like bug (LLVM #101614). -fexperimental-library is harmless if
  # not needed and unlocks not-yet-stabilized C++23 bits in libc++.
  CLANG_STDLIB_FLAGS: "-stdlib=libc++ -fexperimental-library"

jobs:
  build-and-test:
    name: "${{ matrix.preset }} (${{ matrix.compiler }})"
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # ===== Debug + ASan builds =====
          - preset: dev-debug-asan
            compiler: clang
            cc: clang
            cxx: clang++

          - preset: dev-debug-asan
            compiler: gcc
            cc: gcc
            cxx: g++

          # ===== Release + Tests builds =====
          - preset: ci-tests-release
            compiler: clang
            cc: clang
            cxx: clang++

          - preset: ci-tests-release
            compiler: gcc
            cc: gcc
            cxx: g++

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== LLVM/Clang =====
      # clang-format and clang-tidy are required by FormatCheck / TidyCheck
      # CTest targets even when the compiler under test is GCC.
      # `all` also installs libc++-${LLVM_VERSION}-dev / libc++abi, which is
      # exactly what the clang legs link against via CLANG_STDLIB_FLAGS.
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_VERSION }} all

          # Generic clang-format / clang-tidy aliases (the cmake modules
          # search versioned names first, but having the generic name around
          # avoids surprises in editor integrations).
          sudo update-alternatives --install /usr/bin/clang-format clang-format \
            /usr/bin/clang-format-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy \
            /usr/bin/clang-tidy-${{ env.LLVM_VERSION }} 100

      # ===== Clang as the compiler =====
      - name: Setup Clang ${{ env.LLVM_VERSION }} as compiler
        if: matrix.compiler == 'clang'
        run: |
          sudo update-alternatives --install /usr/bin/clang clang \
            /usr/bin/clang-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ \
            /usr/bin/clang++-${{ env.LLVM_VERSION }} 100

      # ===== GCC as the compiler =====
      - name: Setup GCC ${{ env.GCC_VERSION }} as compiler
        if: matrix.compiler == 'gcc'
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}

          sudo update-alternatives --install /usr/bin/gcc gcc \
            /usr/bin/gcc-${{ env.GCC_VERSION }} 100
          sudo update-alternatives --install /usr/bin/g++ g++ \
            /usr/bin/g++-${{ env.GCC_VERSION }} 100

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Install GoogleTest
        run: |
          sudo apt-get install -y libgtest-dev
          # Ubuntu ships the GTest source; we still need to build & install it.
          cd /usr/src/googletest
          sudo cmake .
          sudo cmake --build .
          sudo cmake --install .

      - name: Verify toolchain
        run: |
          echo "=== Compiler ==="
          ${{ matrix.cxx }} --version
          echo "=== stdlib / ranges::iota check ==="
          # Use the exact same stdlib flags the build will use, so this probe
          # reflects reality. _LIBCPP_VERSION => libc++, _GLIBCXX_RELEASE => libstdc++.
          echo '#include <version>' | ${{ matrix.cxx }} -std=c++23 ${{ matrix.compiler == 'clang' && env.CLANG_STDLIB_FLAGS || '' }} -x c++ -dM -E - \
            | grep -E '_LIBCPP_VERSION|_GLIBCXX_RELEASE|__cpp_lib_ranges_iota' \
            || echo "ranges::iota macro NOT defined (use std::iota or check stdlib)"
          echo "=== Clang Tools ==="
          clang-format --version
          clang-tidy --version

      # ===== CMake Configure / Build / Test =====
      - name: Configure
        run: |
          EXTRA_FLAGS="-Wno-unknown-warning-option -Wno-unused-command-line-argument"
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS ${{ env.CLANG_STDLIB_FLAGS }}"
          fi
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_CXX_FLAGS="$EXTRA_FLAGS"

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --verbose
        env:
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:print_stats=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

      # ===== Artifacts (release builds only) =====
      # Upload just the executables, not the entire build tree (objects,
      # ninja state, gcda files etc. inflate the artifact tenfold).
      - name: Upload artifacts
        if: matrix.preset == 'ci-tests-release'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.preset }}-${{ matrix.compiler }}
          path: |
            build/${{ matrix.preset }}/app/app
            build/${{ matrix.preset }}/tests/unit/**/[A-Z]*
          if-no-files-found: warn
          retention-days: 7